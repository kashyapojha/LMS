spring.application.name=LMS_backend
server.port=${PORT:8082}

# Default active profile (dev uses in-memory H2 database, postgres uses PostgreSQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Default / Fallback Database Configuration (H2 In-Memory)
# Overridden when running with spring.profiles.active=postgres
spring.datasource.url=jdbc:h2:mem:lms;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Cloudinary Storage Configuration
# These are set via System.setProperty() from the .env file loader in LMSBackendApplication.java
cloudinary.cloud-name=${cloudinary.cloud-name:${CLOUDINARY_CLOUD_NAME:}}
cloudinary.api-key=${cloudinary.api-key:${CLOUDINARY_API_KEY:}}
cloudinary.api-secret=${cloudinary.api-secret:${CLOUDINARY_API_SECRET:}}

# Multipart Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
